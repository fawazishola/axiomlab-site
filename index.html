<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Lab | Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 680px; width: 100%; text-align: center; }
    .wordmark {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #E91C24;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .divider-top {
      width: 1px; height: 48px;
      background: #222222;
      margin: 0 auto 3rem;
    }
    .headline {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #FFFFFF;
      margin-bottom: 0.4rem;
    }
    .headline-sub {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #333333;
      margin-bottom: 2.5rem;
    }
    .descriptor {
      font-size: 15px;
      font-weight: 400;
      color: #555555;
      line-height: 1.8;
      max-width: 500px;
      margin: 0 auto 3rem;
      letter-spacing: 0.01em;
    }
    .descriptor em { color: #888888; font-style: normal; }
    .terminal-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #111111;
      border: 1px solid #1E1E1E;
      border-radius: 6px;
      padding: 10px 18px;
      margin-bottom: 3rem;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
    }
    .terminal-prompt { color: #E91C24; }
    .terminal-text { color: #555555; }
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: #E91C24;
      animation: blink 1.2s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .divider-bottom {
      width: 40px; height: 1px;
      background: #E91C24;
      margin: 0 auto 2rem;
    }
    .footer {
      font-size: 12px;
      color: #2A2A2A;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: #E91C24;
      border-radius: 50%;
      margin: 0 10px;
      vertical-align: middle;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #888888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">Axiom Lab</div>
    <div class="divider-top"></div>
    <h1 class="headline">Coming Soon.</h1>
    <h2 class="headline-sub">Something is being built.</h2>
    <p class="descriptor">
      An undergraduate-led frontier research consortium for applying
      <em>neurosymbolic systems thinking</em> to unsolved scientific
      and engineering problems.
    </p>
    <div class="terminal-line">
      <span class="terminal-prompt">axiom@lab:~$</span>
      <span class="terminal-text">./init --mode=build</span>
      <span class="cursor"></span>
    </div>
    <div class="divider-bottom"></div>
    <p class="footer">
      Ottawa, Canada
      <span class="dot"></span>
      <a href="https://fawazishola.ca">fawazishola.ca</a>
      <span class="dot"></span>
      April 2026
    </p>
  </div>
</body>
</html>
